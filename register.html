<!DOCTYPE html>
<html>
<head>
<title>Cyber Firewall Register</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Consolas;
    background:black;
    overflow:hidden;
    color:#00ff99;
}

/* BACKGROUND ANIMATION */

body::before{
    content:'';
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(#00ff99 1px, transparent 1px);
    background-size:40px 40px;
    animation:moveBg 20s linear infinite;
    opacity:0.1;
}

@keyframes moveBg{
    from{ transform:translate(0,0); }
    to{ transform:translate(-200px,-200px); }
}

/* REGISTER BOX */

.register-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:350px;
    padding:40px;
    background:rgba(0,0,0,0.85);
    border-radius:10px;
    box-shadow:0 0 25px #00ff99;
    text-align:center;
}

.register-box h2{
    margin-bottom:30px;
    text-shadow:0 0 10px #00ff99;
}

input{
    width:100%;
    padding:12px;
    margin:12px 0;
    background:black;
    border:1px solid #00ff99;
    color:#00ff99;
    border-radius:5px;
}

input:focus{
    outline:none;
    box-shadow:0 0 10px #00ff99;
}

button{
    width:100%;
    padding:12px;
    background:#00ff99;
    color:black;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#00cc77;
    box-shadow:0 0 20px #00ff99;
}

a{
    color:#00ff99;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="register-box">

<h2>CREATE ACCOUNT</h2>

<form action="register" method="post">

<input type="text" name="username"
placeholder="Username" required>

<input type="password" name="password"
placeholder="Password" required>

<button type="submit">REGISTER</button>

</form>

<br>

<a href="login.html">Back to Login</a>

</div>

</body>
</html>
