<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
    font-family: "Segoe UI", Arial;
    background: #eef1f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 12px;
    width: 340px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
    animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    margin-bottom: 25px;
    color: #2f3e46;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

input:focus {
    border-color: #2f3e46;
    outline: none;
    box-shadow: 0 0 5px rgba(47,62,70,0.3);
}

button {
    width: 100%;
    padding: 12px;
    background: #2f3e46;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #354f52;
}

a {
    display: block;
    margin-top: 15px;
    color: #2f3e46;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Create Account</h2>

    <form action="register" method="post">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Register</button>
    </form>

    <a href="login.html">Back to login</a>
</div>

</body>
</html>
